  # REQUIRED: Create a .env file with these variables before running:
  #   POSTGRES_PASSWORD=<strong-random-password>
  #   VAAK_WEB_SECRET_KEY=<random-64-char-string>
  #   VAAK_WEB_FERNET_KEY=<fernet-key>
  #
  # Generate secrets:
  #   python -c "import secrets; print(secrets.token_urlsafe(48))"
  #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vaak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vaak_web}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vaak}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    # NOTE: Dockerfile uses --workers 1 (required — agent runtime uses in-memory state)
    build:
      context: .
      dockerfile: web-service/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      VAAK_WEB_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-vaak}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vaak_web}
      VAAK_WEB_SECRET_KEY: ${VAAK_WEB_SECRET_KEY:?Set VAAK_WEB_SECRET_KEY in .env}
      VAAK_WEB_FERNET_KEY: ${VAAK_WEB_FERNET_KEY:-}
      VAAK_WEB_ANTHROPIC_API_KEY: ${VAAK_WEB_ANTHROPIC_API_KEY:-}
      VAAK_WEB_OPENAI_API_KEY: ${VAAK_WEB_OPENAI_API_KEY:-}
      VAAK_WEB_GOOGLE_AI_API_KEY: ${VAAK_WEB_GOOGLE_AI_API_KEY:-}
      VAAK_WEB_STRIPE_SECRET_KEY: ${VAAK_WEB_STRIPE_SECRET_KEY:-}
      VAAK_WEB_STRIPE_WEBHOOK_SECRET: ${VAAK_WEB_STRIPE_WEBHOOK_SECRET:-}
      VAAK_WEB_STRIPE_PRICE_PRO: ${VAAK_WEB_STRIPE_PRICE_PRO:-}
      VAAK_WEB_STRIPE_PRICE_BYOK: ${VAAK_WEB_STRIPE_PRICE_BYOK:-}
      VAAK_WEB_CORS_ORIGINS: '["http://localhost:3000"]'

  web:
    build:
      context: web-client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
