# UI2 ("One Window" decree §3.1/§7): clean-clone verification on all three
# platforms — frontend typecheck + production build + unit/smoke tests, and
# a cargo check of the Tauri shell. The full bundled desktop build (heavier)
# stays in build.yml (workflow_dispatch / tags).
name: UI2 CI

on:
  push:
    branches: ["**"]
    paths:
      - "desktop/**"
      - ".github/workflows/ui2-ci.yml"
  pull_request:
    paths:
      - "desktop/**"

jobs:
  ui2:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: windows-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Typecheck + production build
        working-directory: desktop
        run: npm run build

      - name: UI2 unit + smoke tests
        working-directory: desktop
        run: npx vitest run src/ui2

  # browser-mode e2e + §7 paint measurements (register ②③): real Chromium,
  # production bundle via vite preview, Tauri IPC mocked at
  # __TAURI_INTERNALS__ — limitation recorded in e2e/tauriMock.ts
  e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Install Chromium
        working-directory: desktop
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e + perf bars
        working-directory: desktop
        run: npx playwright test

  # REQUIRED since 8b04394: the cfg(unix) get_parent_pid fix made the shell
  # compile on Linux for the first time — green on the merits, so this job
  # vetoes again. (It was briefly continue-on-error while the failure was
  # undiagnosed; that flag must not return without a register entry.)
  shell-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux webkit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libasound2-dev libdbus-1-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # tauri_build::build() validates externalBin (binaries/vaak-mcp-<target>)
      # at compile time, but only the Windows sidecar is committed — and the
      # sidecar can't be built first because it lives in the same crate behind
      # the same build script (chicken-and-egg, CI run 27249860932). A
      # placeholder satisfies the existence check; cargo check compiles
      # nothing that executes it.
      - name: Placeholder sidecar for externalBin validation
        working-directory: desktop/src-tauri
        run: touch binaries/vaak-mcp-x86_64-unknown-linux-gnu

      # errors surface as ::error:: annotations — the public Checks API can
      # read those while raw job logs stay admin-gated (msg 329/331 method)
      - name: Cargo check (Tauri shell)
        working-directory: desktop/src-tauri
        run: |
          set +e
          cargo check --locked --message-format short 2>&1 | tee /tmp/check.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            grep -E "^error|error\[|error:" /tmp/check.log | head -40 | while read -r line; do
              echo "::error::$line"
            done
          fi
          exit "$status"
