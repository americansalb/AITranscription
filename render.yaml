# Render Blueprint - deploys backend automatically
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vaak-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -e . &&
      alembic upgrade head &&
      (python -m scripts.seed_admin --force || echo "Admin seed skipped (set ADMIN_SEED_ACCOUNTS + ADMIN_BOOTSTRAP_PASSWORD to enable)") &&
      cd ../vaak-lite/frontend && npm install && npm run build &&
      rm -rf ../../backend/app/vaaklite/static &&
      cp -r dist ../../backend/app/vaaklite/static
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vaak-db
          property: connectionString
      # Optional: dev/admin account seeding at build time. If unset, seeding is
      # skipped (the build no longer fails on it).
      - key: ADMIN_SEED_ACCOUNTS
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      # Optional: shared-secret gate for the bulk Transcription Studio at /studio.
      # Leave unset to keep it open (like /vaaklite and /translate).
      - key: STUDIO_ACCESS_TOKEN
        sync: false
    healthCheckPath: /api/v1/health

databases:
  - name: vaak-db
    plan: free
    databaseName: vaak
    user: vaak
